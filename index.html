<!DOCTYPE html>
<html>
<head>
    <title>NEON SLOPE</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Arial Black', sans-serif; }
        canvas { display: block; }
        #ui { position: absolute; top: 20px; left: 20px; color: #fff; font-size: 30px; pointer-events: none; text-shadow: 0 0 20px #0ff; }
        #highscore-ui { position: absolute; top: 20px; right: 20px; color: #0ff; font-size: 20px; pointer-events: none; text-shadow: 0 0 15px #0ff; text-align: right; }
        #overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #0ff; text-align: center; background: rgba(0,0,0,0.9); padding: 50px; border: 5px solid #0ff; border-radius: 20px; box-shadow: 0 0 50px #0ff; z-index: 50; }
        button { background: #0ff; color: #000; border: none; padding: 20px 40px; font-size: 25px; font-weight: bold; cursor: pointer; border-radius: 10px; }
        #leaderboard-panel { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #0ff; text-align: center; background: rgba(0,0,0,0.97); padding: 40px; border: 3px solid #0ff; border-radius: 20px; box-shadow: 0 0 50px #0ff; display: none; min-width: 340px; z-index: 200; }
        #leaderboard-panel h2 { font-size: 22px; margin-bottom: 16px; letter-spacing: 0.1em; }
        .lb-row { display: flex; justify-content: space-between; padding: 8px 4px; border-bottom: 1px solid #0ff3; font-size: 15px; }
        .lb-rank { color: #0aa; min-width: 30px; }
        .lb-name { flex: 1; text-align: left; padding-left: 10px; }
        .lb-score { color: #fff; }
        .lb-row.gold .lb-rank, .lb-row.gold .lb-name { color: #ffd700; }
        #name-overlay { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); color: #0ff; text-align: center; background: rgba(0,0,0,0.97); padding: 40px; border: 3px solid #0ff; border-radius: 20px; box-shadow: 0 0 50px #0ff; z-index: 200; min-width: 300px; }
        #name-input { background: #001a1a; border: 2px solid #0ff; color: #0ff; padding: 10px 16px; font-size: 18px; border-radius: 8px; margin: 12px 0; width: 100%; text-align: center; font-family: 'Arial Black', sans-serif; outline: none; box-sizing: border-box; }
        .btn-small { background: #0ff; color: #000; border: none; padding: 10px 24px; font-size: 16px; font-weight: bold; cursor: pointer; border-radius: 8px; margin: 4px; }
        .btn-ghost { background: transparent; color: #0ff; border: 2px solid #0ff; border-radius: 8px; padding: 10px 24px; font-size: 16px; font-weight: bold; cursor: pointer; margin: 4px; }
    </style>
</head>
<body>
    <div id="ui">SCORE: 0</div>
    <div id="highscore-ui">BEST: 0</div>

    <div id="overlay">
        <h1>NEON SLOPE</h1>
        <p style="font-size:14px; color:#0aa; letter-spacing:0.12em; margin-bottom:16px;">MADE BY CHEESE STUDIOS</p>
        <p style="margin-bottom:20px;">GENERATING SYNTHWAVE...</p>
        <div style="display:flex;gap:12px;justify-content:center;">
            <button onclick="startGame()">PLAY</button>
            <button style="background:transparent;color:#0ff;border:3px solid #0ff;padding:20px 24px;font-size:20px;font-weight:bold;cursor:pointer;border-radius:10px;" onclick="showLeaderboard()">🏆 SCORES</button>
        </div>
    </div>

    <div id="name-overlay">
        <h2 style="font-size:22px;margin-bottom:4px;">GAME OVER</h2>
        <p id="final-score-text" style="font-size:36px;font-weight:bold;color:#fff;margin:8px 0;"></p>
        <p id="new-best-text" style="font-size:13px;color:#0ff;min-height:18px;margin-bottom:12px;"></p>
        <p style="font-size:13px;margin-bottom:4px;color:#0aa;">ENTER YOUR NAME</p>
        <input id="name-input" type="text" maxlength="12" placeholder="PLAYER" />
        <br>
        <button class="btn-small" onclick="submitScore()">SUBMIT</button>
        <button class="btn-ghost" onclick="skipSubmit()">SKIP</button>
    </div>

    <div id="leaderboard-panel">
        <h2>🏆 LEADERBOARD</h2>
        <div id="lb-entries"></div>
        <button class="btn-ghost" style="margin-top:20px;" onclick="closeLeaderboard()">CLOSE</button>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const ui = document.getElementById('ui');
const overlay = document.getElementById('overlay');
const highscoreUI = document.getElementById('highscore-ui');
const nameOverlay = document.getElementById('name-overlay');
const leaderboardPanel = document.getElementById('leaderboard-panel');

// --- AUDIO SETUP ---
const bgMusic = new Audio('Unnamed.mp3'); 
bgMusic.loop = true;

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let player = { x: canvas.width / 2, y: canvas.height - 200, vx: 0, radius: 15 };
let speed = 8, score = 0, gameActive = false, keys = {}, platforms = [];
let personalBest = parseInt(localStorage.getItem('neonslope_best') || '0');
highscoreUI.innerHTML = 'BEST: ' + personalBest;

function getLeaderboard() {
    try { return JSON.parse(localStorage.getItem('neonslope_lb') || '[]'); } catch(e) { return []; }
}
function saveLeaderboard(lb) {
    localStorage.setItem('neonslope_lb', JSON.stringify(lb));
}

// --- SYNTH AUDIO (ORIGINAL) ---
let audioCtx, nextNoteTime = 0, beatCount = 0;
function playNote(freq, type, duration, vol) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + duration);
}
function musicLoop() {
    if (!gameActive) return;
    if (audioCtx.currentTime > nextNoteTime) {
        let step = beatCount % 16;
        let tempo = 0.15 - (speed * 0.002);
        let notes = [55, 55, 65, 55, 82, 55, 65, 73];
        playNote(notes[beatCount % 8], 'square', 0.2, 0.05);
        if (step % 4 === 0) playNote(40, 'sine', 0.3, 0.2);
        if (step % 8 === 4) playNote(1000, 'triangle', 0.05, 0.02);
        nextNoteTime = audioCtx.currentTime + tempo;
        beatCount++;
    }
    requestAnimationFrame(musicLoop);
}

// --- PLATFORMS ---
function initPlatforms() {
    platforms = [];
    for(let i = 0; i < 15; i++) {
        platforms.push({ x: canvas.width/2 - 250, y: canvas.height - (i * 150), w: 500, h: 151 });
    }
}

// --- GAME FLOW ---
function startGame() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    // START MP3 MUSIC
    bgMusic.currentTime = 0;
    bgMusic.play().catch(e => console.log("Music blocked: ", e));

    initPlatforms();
    player.x = canvas.width/2; player.vx = 0; score = 0; speed = 8;
    gameActive = true;
    overlay.style.display = 'none';
    nameOverlay.style.display = 'none';
    leaderboardPanel.style.display = 'none';
    nextNoteTime = audioCtx.currentTime;
    musicLoop();
}

function endGame() {
    gameActive = false;
    
    // STOP MP3 MUSIC
    bgMusic.pause();

    playNote(100, 'sawtooth', 1, 0.2);
    const isNewBest = score > personalBest;
    if (isNewBest) {
        personalBest = score;
        localStorage.setItem('neonslope_best', personalBest);
        highscoreUI.innerHTML = 'BEST: ' + personalBest;
    }
    setTimeout(() => {
        document.getElementById('final-score-text').textContent = score;
        document.getElementById('new-best-text').textContent = isNewBest ? '🔥 NEW PERSONAL BEST!' : 'BEST: ' + personalBest;
        document.getElementById('name-input').value = '';
        nameOverlay.style.display = 'block';
    }, 300);
}

function submitScore() {
    const name = document.getElementById('name-input').value.trim().toUpperCase() || 'PLAYER';
    const lb = getLeaderboard();
    lb.push({ name, score });
    lb.sort((a, b) => b.score - a.score);
    saveLeaderboard(lb.slice(0, 10));
    nameOverlay.style.display = 'none';
    showLeaderboard();
}

function skipSubmit() {
    nameOverlay.style.display = 'none';
    overlay.style.display = 'block';
}

function showLeaderboard() {
    const lb = getLeaderboard();
    const container = document.getElementById('lb-entries');
    if (lb.length === 0) {
        container.innerHTML = '<p style="color:#0aa;font-size:14px;margin:20px 0;">NO SCORES YET. BE THE FIRST!</p>';
    } else {
        container.innerHTML = lb.map((entry, i) =>
            '<div class="lb-row ' + (i === 0 ? 'gold' : '') + '">' +
            '<span class="lb-rank">#' + (i+1) + '</span>' +
            '<span class="lb-name">' + entry.name + '</span>' +
            '<span class="lb-score">' + entry.score + '</span>' +
            '</div>'
        ).join('');
    }
    overlay.style.display = 'none';
    leaderboardPanel.style.display = 'block';
}

function closeLeaderboard() {
    leaderboardPanel.style.display = 'none';
    overlay.style.display = 'block';
}

// --- INPUT ---
window.addEventListener('keydown', e => keys[e.code] = true);
window.addEventListener('keyup', e => keys[e.code] = false);

// --- UPDATE ---
function update() {
    if (!gameActive) return;
    if (keys['ArrowLeft'] || keys['KeyA']) player.vx -= 1.5;
    if (keys['ArrowRight'] || keys['KeyD']) player.vx += 1.5;
    player.vx *= 0.92; player.x += player.vx;
    platforms.forEach(p => p.y += speed);

    if (platforms[0].y > canvas.height) {
        platforms.shift();
        score += 10; speed += 0.04;
        let last = platforms[platforms.length - 1];
        platforms.push({
            x: last.x + (Math.random() * 200 - 100),
            y: last.y - 150,
            w: Math.max(80, 450 - (score/5)),
            h: 151
        });
    }

    let onTrack = false;
    platforms.forEach(p => {
        if (player.x > p.x && player.x < p.x + p.w && player.y > p.y && player.y < p.y + p.h) onTrack = true;
    });

    if (!onTrack) endGame();
    ui.innerHTML = 'SCORE: ' + score;
}

// --- DRAW ---
function draw() {
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    platforms.forEach((p) => {
        ctx.shadowBlur = 15; ctx.shadowColor = '#0ff';
        ctx.fillStyle = '#001111';
        ctx.fillRect(p.x, p.y, p.w, p.h);
        ctx.strokeStyle = '#0ff'; ctx.lineWidth = 3;
        ctx.strokeRect(p.x, p.y, p.w, p.h);
    });
    ctx.shadowBlur = 25; ctx.shadowColor = '#fff';
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(player.x, player.y, player.radius, 0, Math.PI*2); ctx.fill();
    requestAnimationFrame(() => { update(); draw(); });
}
initPlatforms();
draw();
</script>
</body>
</html>
